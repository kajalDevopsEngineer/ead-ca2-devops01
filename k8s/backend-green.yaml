apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-green
  namespace: ead-ca201
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
      version: green
  template:
    metadata:
      labels:
        app: backend
        version: green
    spec:
      containers:
      - name: backend
        image: acreaadca2012104262113.azurecr.io/backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: MONGO_URI