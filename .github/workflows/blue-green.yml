name: Blue-Green Deployment

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:

    # 1. Checkout code
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. Build Docker image (GREEN version)
    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-app:v2 .

    # 4. Push image
    - name: Push Docker image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/backend-app:v2

    # 5. Setup kubectl
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3

    - name: Configure Kubeconfig
      run: |
        echo "${{ secrets.KUBECONFIG_DATA }}" > kubeconfig
        export KUBECONFIG=kubeconfig

    # 6. Deploy GREEN version
    - name: Deploy Green
      run: |
        kubectl apply -f k8s/backend-green.yaml

    # 7. Wait for GREEN rollout
    - name: Wait for Green Deployment
      run: |
        kubectl rollout status deployment/backend-green -n ead-ca201

    # 8. Health check (important for marks)
    - name: Health Check
      run: |
        kubectl get pods -n ead-ca201

    # 9. Switch Traffic to GREEN
    - name: Switch Service to Green
      run: |
        kubectl patch service backend-service -n ead-ca201 -p '{"spec":{"selector":{"app":"backend","version":"green"}}}'