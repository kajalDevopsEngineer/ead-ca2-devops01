name: Blue-Green Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. Docker login
      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build image (IMPORTANT FIXED PATH)
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-app:${{ github.sha }} ./BE

      # 4. Push image
      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/backend-app:${{ github.sha }}

      # 5. Setup kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      # Azure login (NEW - IMPORTANT)
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Get fresh AKS kubeconfig (REPLACEMENT for old step)
      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-ead-ca201 \
            --name aks-ead-cluster \
            --overwrite-existing

      # 7. Verify cluster access
      - name: Verify cluster access
        run: |
          kubectl cluster-info
          kubectl get nodes
          kubectl get pods -n ead-ca201

      # 8. Deploy GREEN (NEW VERSION)
      - name: Deploy Green
        run: |
          kubectl set image deployment/backend-green \
            backend=${{ secrets.DOCKER_USERNAME }}/backend-app:${{ github.sha }} \
            -n ead-ca201

      # 9. Wait for GREEN rollout
      - name: Wait Green
        run: |
          kubectl rollout status deployment/backend-green -n ead-ca201

      # 10. Verify Green Pods
      - name: Verify Green Pods
        run: |
          kubectl get pods -n ead-ca201

      # 11. Switch traffic (SERVICE SHIFT)
      - name: Switch traffic to GREEN
        run: |
          kubectl patch service backend-service -n ead-ca201 \
            -p '{"spec":{"selector":{"app":"backend","version":"green"}}}'