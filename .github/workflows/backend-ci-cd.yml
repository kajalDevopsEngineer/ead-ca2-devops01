name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v3

      # Docker login
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Build Docker image
      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-app:${{ github.sha }} ./BE

      # Scan Docker Image (Trivy)
      - name: Scan Docker Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/backend-app:${{ github.sha }}
          format: table
          exit-code: '0'

      # Push Docker image
      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend-app:${{ github.sha }}

      # Install kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      # Azure login
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Get AKS credentials
      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-ead-ca201 \
            --name aks-ead-cluster \
            --overwrite-existing

      # Verify cluster access
      - name: Verify cluster access
        run: |
          kubectl cluster-info
          kubectl get nodes
          kubectl get pods -n ead-ca201

      # Update deployments
      - name: Update BLUE and GREEN
        run: |
          kubectl set image deployment/backend-blue \
            backend=${{ secrets.DOCKER_USERNAME }}/backend-app:${{ github.sha }} \
            -n ead-ca201

          kubectl set image deployment/backend-green \
            backend=${{ secrets.DOCKER_USERNAME }}/backend-app:${{ github.sha }} \
            -n ead-ca201

      # Wait for rollout
      - name: Wait rollout
        run: |
          kubectl rollout status deployment/backend-blue -n ead-ca201
          kubectl rollout status deployment/backend-green -n ead-ca201