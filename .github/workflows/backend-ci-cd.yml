name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Docker Login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-app:${{ github.sha }} ./BE

    - name: Push image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/backend-app:${{ github.sha }}

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3

    - name: Configure kubeconfig
      run: |
        echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > $HOME/.kube/config
        kubectl version --client
        kubectl cluster-info

    # OPTIONAL (only if you still maintain blue/green separately)
    - name: Update BLUE or GREEN manually
      run: |
        kubectl set image deployment/backend-blue backend=${{ secrets.DOCKER_USERNAME }}/backend-app:${{ github.sha }} -n ead-ca201
        kubectl set image deployment/backend-green backend=${{ secrets.DOCKER_USERNAME }}/backend-app:${{ github.sha }} -n ead-ca201

    - name: Wait rollout
      run: |
        kubectl rollout status deployment/backend-blue -n ead-ca201
        kubectl rollout status deployment/backend-green -n ead-ca201