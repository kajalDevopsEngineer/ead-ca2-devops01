name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:
  
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-app:${{ github.sha }} ./FE

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend-app:${{ github.sha }}

      #Install kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      # Azure login (NEW - IMPORTANT)
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Get fresh AKS kubeconfig (REPLACEMENT for old step)
      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-ead-ca201 \
            --name aks-ead-cluster \
            --overwrite-existing

      # Verify cluster access
      - name: Verify cluster access
        run: |
          kubectl cluster-info
          kubectl get nodes
          kubectl get pods -n ead-ca201

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/frontend-deployment.yaml -n ead-ca201
          kubectl rollout status deployment/frontend -n ead-ca201